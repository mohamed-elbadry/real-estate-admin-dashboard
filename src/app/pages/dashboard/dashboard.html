<div class="container-fluid">

  <h2 class="mb-4">
    Real Estate Dashboard
  </h2>

  <div class="row g-4">

    <div class="col-md-3">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h3>120</h3>
          <p>Total Properties</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h3>85</h3>
          <p>Clients</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h3>18</h3>
          <p>New Orders</p>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h3>$250K</h3>
          <p>Total Sales</p>
        </div>
      </div>
    </div>

  </div>

  <div class="card shadow-sm mt-4 card stat-card shadow-sm">

  <div class="card-header">
    Latest Properties
  </div>

  <div class="table-responsive">

    <table class="table mb-0">

      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Status</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>

        @for(property of properties; track property.id){

        <tr>
          <td>{{property.name}}</td>
          <td>{{property.type}}</td>
          <td>{{property.status}}</td>
          <td>${{property.price}}</td>
        </tr>

        }

      </tbody>

    </table>

  </div>

</div>
</div>
